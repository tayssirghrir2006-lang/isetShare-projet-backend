security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|assets|build)/
            security: false

        # ── Login JWT ── (avant api_register)
        api_login:
            pattern: ^/api/login$
            stateless: true
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # ── Register — pas de JWT ──
        api_register:
            pattern: ^/api/register$
            stateless: true
            security: false

        # ── Routes référentiel publiques — pas de JWT ──
        api_referentiel:
            pattern: ^/api/(isets|departements|types-documents)$
            stateless: true
            security: false

        # ── Zone API principale ──
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        # ── Publiques ──
        - { path: ^/api/login,           roles: PUBLIC_ACCESS }
        - { path: ^/api/register,        roles: PUBLIC_ACCESS }
        - { path: ^/api/isets,           roles: PUBLIC_ACCESS }
        - { path: ^/api/departements,    roles: PUBLIC_ACCESS }
        - { path: ^/api/types-documents, roles: PUBLIC_ACCESS }

        # ── Admin uniquement ──
        - { path: ^/api/admin,           roles: ROLE_ADMIN }

        # ── Tout le reste : connecté (user ou admin) ──
        - { path: ^/api,                 roles: IS_AUTHENTICATED_FULLY }

    role_hierarchy:
        ROLE_ADMIN: ROLE_USER

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10